<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>TODO</h1>

    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="新しいタスクを入力..." autocomplete="off">
      <button type="submit">追加</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="active">未完了</button>
      <button class="filter-btn" data-filter="completed">完了済み</button>
    </div>

    <ul id="todo-list"></ul>

    <div class="footer">
      <span id="remaining-count">0件残り</span>
      <button id="clear-completed">完了済みを削除</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
